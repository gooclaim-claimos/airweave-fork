name: Gooclaim CI

# Gooclaim-owned CI for the fork. Runs on push / PR against `develop`
# (our integration branch; upstream uses `main`). Keeps our workflow
# changes in a dedicated file so upstream rebases stay conflict-free.
#
# Coverage:
#   1. Backend lint  : ruff check + ruff format --check
#   2. Backend tests : pytest unit tests on python 3.13 (matches upstream)
#
# Not included (handled by upstream workflows that run on `main`):
#   - frontend lint / build (we don't touch frontend in v1.0)
#   - integration / live_integration tests (need GCP creds)
#   - codeql / gitleaks (already run on main and PRs to main)

on:
  push:
    branches: ["develop"]
    paths:
      - "backend/**"
      - ".github/workflows/gooclaim-ci.yml"
  pull_request:
    branches: ["develop"]
    paths:
      - "backend/**"
      - ".github/workflows/gooclaim-ci.yml"

permissions:
  contents: read

jobs:
  lint:
    name: Backend lint (ruff)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Install ruff
        run: pip install "ruff==0.15.13"

      - name: ruff check
        run: ruff check .

      - name: ruff format --check
        run: ruff format --check .

  unit-tests:
    name: Backend unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Install Poetry
        uses: snok/install-poetry@76e04a911780d5b312d89783f7b1cd627778900a # v1.4.1
        with:
          version: 2.3.2
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Load cached venv
        id: cached-poetry-deps
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ./backend/.venv
          key: venv-${{ runner.os }}-${{ hashFiles('**/poetry.lock') }}

      - name: Install dependencies
        if: steps.cached-poetry-deps.outputs.cache-hit != 'true'
        run: poetry install --no-interaction --no-root

      - name: Install project
        run: poetry install --no-interaction

      - name: Run unit tests
        env:
          # Minimum env vars Airweave Settings() needs at import time.
          # All values are CI-only placeholders, not real secrets.
          FIRST_SUPERUSER: "test@test.com"
          FIRST_SUPERUSER_PASSWORD: "testpassword"
          ENCRYPTION_KEY: "test-encryption-key-for-ci-only"
          STATE_SECRET: "test-state-secret-for-ci-only-must-be-32-chars-long"
          SVIX_JWT_SECRET: "test-svix-jwt-secret-for-ci-only-32-chars-long"
          POSTGRES_HOST: "localhost"
          POSTGRES_USER: "test"
          POSTGRES_PASSWORD: "test"
        run: poetry run pytest tests/unit -v --tb=short
